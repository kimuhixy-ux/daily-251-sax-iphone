<!doctype html>

  <title>Daily Ⅱ–Ⅴ–Ⅰ Sax Practice</title>
  <style>
    :root { color-scheme: light; --bg:#f6f2ea; --card:#fffdf8; --ink:#201f1b; --muted:#6f665b; --line:#d7cfc1; --accent:#0f6b5f; --accent-2:#b45137; --soft:#efe7d9; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif; background:var(--bg); color:var(--ink); }
    main { max-width:760px; margin:0 auto; padding:calc(18px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom)); }

    .sub { color:var(--muted); margin:0 0 18px; font-size:14px; }
    .controls { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:16px 0; }
    .controls .full { grid-column:1 / -1; }
    label { display:block; color:var(--muted); font-size:12px; margin:0 0 5px; }
    select, button { width:100%; border:1px solid var(--line); border-radius:8px; padding:12px; font-size:16px; background:#fffdf8; color:var(--ink); }
    button { background:var(--accent); color:white; border-color:var(--accent); font-weight:700; }
    button.secondary { background:#fffdf8; color:var(--accent); }
    button:disabled { opacity:.4; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:18px; box-shadow:0 10px 28px rgba(61,45,27,.10); }
    .date { color:var(--muted); font-size:13px; margin:0 0 10px; }
    .name { font-size:22px; font-weight:800; margin:0 0 16px; color:var(--accent-2); }
    .section { color:var(--muted); font-size:13px; font-weight:700; margin:16px 0 7px; }
    .score { background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:10px 6px; overflow-x:auto; }
    .score svg { display:block; margin:0 auto; }
    .tip { font-size:17px; line-height:1.6; background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:14px; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
    .ireal-actions { display:grid; grid-template-columns:1fr; gap:8px; margin-top:12px; }
    .status { min-height:18px; color:var(--muted); font-size:13px; margin:8px 0 0; }
    details { margin-top:16px; color:var(--muted); }
    details div { margin-top:8px; line-height:1.7; }
    @media (max-width:420px){ h1{font-size:23px}.controls,.actions{grid-template-columns:1fr} }
  </style>
</head>

<main>

  <p class="sub">毎日のジャズ理論フレーズ練習</p>

  <div class="controls">
    <div class="full"><label for="category">カテゴリー</label><select id="category"></select></div>
    <div id="modeField"><label for="mode">モード</label><select id="mode"></select></div>
    <div id="keyField"><label for="key">キー</label><select id="key"></select></div>
  </div>

  <section class="card">
    <p class="date" id="dateLine"></p>
    <p class="name" id="phraseName"></p>
    <div class="score" id="score"></div>
    <p class="section">今日のポイント</p>
    <div class="tip" id="tip"></div>
  </section>

    <button id="irealBtn">iReal Proで開く</button>
    <button class="secondary" id="copyBtn">iReal Pro用リンクをコピー</button>
    <p class="status" id="irealStatus"></p>
  </div>

  <div class="actions">
    <button class="secondary" id="todayBtn">今日のキーに戻す</button>
  </div>
  <div class="actions">
    <button class="secondary" id="prevBtn">◀ 前のフレーズ</button>
    <button id="nextBtn">次のフレーズ ▶</button>
  </div>

  <details>
    <summary>練習メモ</summary>
    <div>
      1. まずテンポ ♩=60 で全部8分音符。<br>
      2. コードだけを先にアルペジオで確認。<br>
      3. キーを変えて12キー移調。<br>
      4. 最後の小節だけ自分で変奏。<br><br>
      音符の下の小さな数字は、その音が「今鳴っているコードに対して」何度かを表します(グレー=コードトーン、紫=テンション)。同じ音でもコードが変わると数字も変わります。
    </div>
  </details>
</main>

/* ---------- misc helpers (dates / hashing / iReal export) ---------- */
function localYmd(date = new Date()){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}
function hashString(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function todayKey(){ const d = new Date(); const n = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate(); return KEYS[n % KEYS.length]; }
function irealChord(chord){
  return chord
    .replace("maj7", "^7")
    .replace("m7b5", "h7")
    .replace("m6", "-6")
    .replace("m7", "-7");
}
// Phrases are written as 4 bars (ii, V, I, I) so the tonic gets a full
// 2 bars to resolve into, but MAJOR_251/MINOR_251 only lists 3 chords.
// Hold the tonic for the 4th bar so displayed/exported measures line up
// 1:1 with the phrase's degree notation.
function practiceBars(chords){
  return [chords[0], chords[1], chords[2], chords[2]];
}
// iReal Pro only accepts minor key labels from a fixed set that uses
// sharps for these three (e.g. "Ab" major becomes "G#-" minor), not flats.
const IREAL_MINOR_KEY_LABEL = {Db:"C#-", Gb:"F#-", Ab:"G#-"};
function irealKeyLabel(mode, key){
  if (!mode.startsWith("Minor")) return key;
  return IREAL_MINOR_KEY_LABEL[key] || `${key}-`;
}
// Turns any category's chordPlan (the same {events, totalBars} structure
// used to draw on-screen chord labels) into one iReal-chord-string per
// bar, so the exported progression can never diverge from what's shown
// on screen. Multiple events sharing a bar (e.g. coltrane's ii and V in
// bar 1) are space-joined into that one bar slot.
function irealBarsFromChordPlan(chordPlan){
  const byBar = new Map();
  chordPlan.events.forEach(e => {
    if (!byBar.has(e.barIndex)) byBar.set(e.barIndex, []);
    byBar.get(e.barIndex).push(e);
  });
  const bars = [];
  for (let i = 0; i < chordPlan.totalBars; i++){
    const evs = (byBar.get(i) || []).slice().sort((a, b) => a.beatInBar - b.beatInBar);
    bars.push(evs.map(e => irealChord(e.label)).join(" "));
  }
  return bars;
}
// Wrapping in repeat bars ({ }) both supplies the opening bar-line marker
// that every real iReal Pro chart starts with (without one, iReal Pro's
// own chord-tone display can fail to sync on measure 1) and lets iReal
// Pro repeat the phrase itself, instead of writing it out twice.
function irealProgressionText(bars){
  return `T44{${bars.join(" |")} } Z`;
}
// Builds the custom irealbook:// URL documented at

function irealUrl(){
  if (!currentPractice) return "";

  const composer = "App Daily251";
  const style = "Medium Swing";
  const keyLabel = irealKeyLabel(mode, key);
  const progression = irealProgressionText(irealBarsFromChordPlan(chordPlan));
  const raw = `${title}=${composer}=${style}=${keyLabel}=n=${progression}`;
  return `irealbook://${encodeURIComponent(raw)}`;
}

/* ---------- theory layer: scale-degree token -> letter/accidental/octave ---------- */
const LETTERS = ['C','D','E','F','G','A','B'];
const NATURAL_PC = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};
const MAJOR_STEP_SEMITONES = [0,2,4,5,7,9,11];
// Target register band for flattenPhrase's octave selection, expressed as
// diatonicStep (0 = E4, the bottom staff line). B3 (still just 1 ledger line
// below the staff -- it sits in the space just under the C4 ledger, so it
// costs nothing extra) up to C6 (2 ledger lines above). Widened by exactly
// 1 step on each side versus a plain C4-B5 band: with only [-2,11], the
// letters "B" (candidates step 4, 11) and "C" (candidates step -2, 5) each
// had just one candidate near the register floor/ceiling, so a Cb/B-natural
// note approaching from a neighboring letter one semitone away (e.g. a
// written Cb next to a D, or a B natural resolving down) had no nearby
// same-letter candidate to land on and was forced into a large jump instead
// (this is what caused notes spelled Cb/B to visibly leap in the score).
// Giving B a low-side candidate (B3) and C a high-side candidate (C6) fixes
// that specific enharmonic seam at both edges of the band, at zero added
// ledger cost on the low side and one extra ledger line on the high side
// (still within the "staff + 1-2 ledger lines" target).
const MELODY_MIN_STEP = -3, MELODY_MAX_STEP = 12;

// Handles both flat ("Db") and sharp ("F#") spellings. Practice keys (from
// KEYS) are always flat-spelled, but chord-symbol roots parsed for the
// chord-relative degree display (e.g. "F#m7") can be sharp, so this must
// recognize both.
function parseKeySpelling(keyStr){
  const acc = keyStr[1] === 'b' ? -1 : keyStr[1] === '#' ? 1 : 0;
  return { letter: keyStr[0], acc };
}
// Degree numbers (1-9, 13, optionally b/#-prefixed) are read as major-scale
// steps above the tonic, per this app's existing notation convention.
function degreeLetterAndPc(tonic, token){
  const m = /^([b#]?)([1-9]|13)[v^]?$/.exec(token);
  const alter = m[1] === 'b' ? -1 : m[1] === '#' ? 1 : 0;
  const num = parseInt(m[2], 10);
  const baseNum = num > 7 ? num - 7 : num;                 // 9->2, 13->6
  const stepFromTonic = (baseNum - 1) + (num > 7 ? 7 : 0);  // diatonic steps above tonic

  const tonicLetterIdx = LETTERS.indexOf(tonic.letter);
  const absLetterIdx = tonicLetterIdx + stepFromTonic;
  const letter = LETTERS[((absLetterIdx % 7) + 7) % 7];
  const letterOctaveOffset = Math.floor(absLetterIdx / 7);

  const tonicPc = ((NATURAL_PC[tonic.letter] + tonic.acc) % 12 + 12) % 12;
  const targetPc = ((tonicPc + MAJOR_STEP_SEMITONES[baseNum - 1] + alter) % 12 + 12) % 12;
  let accidental = targetPc - NATURAL_PC[letter];
  if (accidental > 6) accidental -= 12;
  if (accidental < -6) accidental += 12;
  return { letter, accidental, targetPc };
}
function resolveTonicForSegment(seg, ctx){
  if (seg.tonicRef && seg.tonicRef.centerIndex !== undefined){
    return parseKeySpelling(COLTRANE_CENTERS[ctx.key][seg.tonicRef.centerIndex]);
  }
  return parseKeySpelling(ctx.key);
}
// Picks the octave for one note. Only octaves that keep the note inside the
// [MELODY_MIN_STEP, MELODY_MAX_STEP] register band are considered, so the
// letter name/accidental (and therefore its harmonic meaning, e.g. "b5 of
// Bbm7b5") never changes -- only which octave it's placed in. Among the
// in-band candidates, picks whichever is closest to the previous note
// (prevAbs === null for the first note of a phrase, where it instead picks
// the candidate closest to the middle of the staff, B4).
// `bias` (-1/0/+1) shifts which in-band candidate counts as "closest to the
// previous note" by a octave, without changing the candidate set itself (so
// the register-band guarantee still holds) -- used sparingly, per phrase, to
// break a tie away from a candidate that would otherwise force the *next*
// note into a big jump. See degrees strings using a "v"/"^" token suffix.
function pickOctaveInBand(letter, targetPc, prevAbs, bias){
  bias = bias || 0;
  const guess = prevAbs === null ? 4 : Math.round((prevAbs - targetPc) / 12);
  let candidates = [];
  for (let o = guess - 2; o <= guess + 2; o++){
    const step = diatonicStep(letter, o);
    if (step >= MELODY_MIN_STEP && step <= MELODY_MAX_STEP) candidates.push(o);
  }
  if (!candidates.length){
    for (let o = guess - 6; o <= guess + 6; o++){
      const step = diatonicStep(letter, o);
      if (step >= MELODY_MIN_STEP && step <= MELODY_MAX_STEP) candidates.push(o);
    }
  }
  if (prevAbs === null){
    return candidates.reduce((best, o) =>
      Math.abs(diatonicStep(letter, o) - 4) < Math.abs(diatonicStep(letter, best) - 4) ? o : best);
  }
  const target = prevAbs + bias * 12;
  return candidates.reduce((best, o) =>
    Math.abs(o * 12 + targetPc - target) < Math.abs(best * 12 + targetPc - target) ? o : best);
}
// Duration suffixes on a degree token (after any b/#, before/around a v/^
// register-bias suffix): none = quarter note (1 beat, every phrase before
// this feature), "e" = eighth note (0.5 beat, written in pairs that together
// fill 1 beat), "t" = triplet eighth (1/3 beat, written in groups of 3 that
// together fill 1 beat). A hold token ("-") can carry the same suffix (e.g.
// "-e") to tie/sustain the previous note for that fraction of a beat instead
// of the default full beat.
function parseDurationToken(tok){
  if (tok.endsWith('e')) return { base: tok.slice(0, -1), duration: 0.5 };
  if (tok.endsWith('t')) return { base: tok.slice(0, -1), duration: 1 / 3 };
  return { base: tok, duration: 1 };
}
// Expands a phrase's degree text into a flat list of notes, each carrying its
// bar index, its position within that bar (in beats, possibly fractional for
// eighths/triplets) and its duration (in beats). Each new (non-hold) note
// picks whichever in-band octave lands closest to the previous note's pitch,
// so e.g. "1 6 4 2" actually descends instead of always resolving upward,
// while staying inside the readable register band. A hold token extends the
// previous note's duration instead of starting a new note.
function flattenPhrase(phrase, ctx){
  const segments = phrase.segments || [{ tonicRef: "self", degrees: phrase.degrees }];
  let prevAbs = null;
  let barOffset = 0;
  const notes = [];
  segments.forEach(seg => {
    const tonic = resolveTonicForSegment(seg, ctx);
    const bars = seg.degrees.split("|");
    bars.forEach((barStr, localBarIndex) => {
      const barIndex = barOffset + localBarIndex;
      let beatInBar = 0;
      barStr.trim().split(/\s+/).forEach(tok => {
        const { base, duration } = parseDurationToken(tok);
        if (base === "-") {
          if (notes.length) notes[notes.length - 1].duration += duration;
          beatInBar += duration;
          return;
        }
        const bias = base.endsWith('v') ? -1 : base.endsWith('^') ? 1 : 0;
        const d = degreeLetterAndPc(tonic, base);
        const octave = pickOctaveInBand(d.letter, d.targetPc, prevAbs, bias);
        prevAbs = octave * 12 + d.targetPc;
        notes.push({ barIndex, beatInBar, duration, letter: d.letter, accidental: d.accidental, octave });
        beatInBar += duration;
      });
    });
    barOffset += bars.length;
  });
  return notes;
}

/* ---------- chord-relative degree labels (task 4) ---------- */
// [degreeName, isChordTone] for each semitone offset (0-11) above the chord
// root, one table per chord quality actually used by this app's chord
// dictionaries (all derived from MAJOR_251/MINOR_251, so only maj7/m7/m7b5/
// m6/7/7alt ever appear as a chord label suffix).
const QUALITY_DEGREE_TABLE = {
  "7":    [["1",true],["b9",false],["9",false],["#9",false],["3",true],["11",false],["#11",false],["5",true],["b13",false],["13",false],["b7",true],["7",false]],
  "maj7": [["1",true],["b9",false],["9",false],["#9",false],["3",true],["11",false],["#11",false],["5",true],["#5",false],["13",false],["b7",false],["7",true]],
  "m7":   [["1",true],["b9",false],["9",false],["b3",true],["3",false],["11",false],["#11",false],["5",true],["b13",false],["13",false],["b7",true],["7",false]],
  "m7b5": [["1",true],["b9",false],["9",false],["b3",true],["3",false],["11",false],["b5",true],["5",false],["b13",false],["13",false],["b7",true],["7",false]],
  "m6":   [["1",true],["b9",false],["9",false],["b3",true],["3",false],["11",false],["#11",false],["5",true],["b13",false],["6",true],["b7",false],["7",false]]
};
function parseChordSymbolQuality(label){
  const m = /^([A-G][b#]?)(.*)$/.exec(label);
  const rest = m[2];
  let quality = "7"; // dominant is the fallback: also covers "7alt" (same tension spellings as plain 7)
  if (rest === "maj7") quality = "maj7";
  else if (rest === "m7b5") quality = "m7b5";
  else if (rest === "m6") quality = "m6";
  else if (rest === "m7") quality = "m7";
  return { rootStr: m[1], quality };
}
// Finds the chord sounding under a note (same bar, latest chord event at or
// before the note's own beat position) -- every bar has an event at
// beatInBar 0, so this always finds a match.
function activeChordForNote(note, chordPlan){
  return chordPlan.events
    .filter(e => e.barIndex === note.barIndex && e.beatInBar <= note.beatInBar + 1e-6)
    .reduce((best, e) => (!best || e.beatInBar > best.beatInBar) ? e : best, null);
}
// Phrase degrees are written relative to the tonic (see degreeLetterAndPc),
// but the on-screen label needed here is relative to whichever chord is
// sounding, e.g. a tonic-relative "b6" reads as "b9" while V7 is sounding.
function chordRelativeDegree(note, chordEvent){
  const { rootStr, quality } = parseChordSymbolQuality(chordEvent.label);
  const root = parseKeySpelling(rootStr);
  const rootPc = ((NATURAL_PC[root.letter] + root.acc) % 12 + 12) % 12;
  const notePc = ((NATURAL_PC[note.letter] + note.accidental) % 12 + 12) % 12;
  const offset = ((notePc - rootPc) % 12 + 12) % 12;
  const [name, isChordTone] = QUALITY_DEGREE_TABLE[quality][offset];
  return { name, isChordTone };
}

/* ---------- SVG score rendering (pure geometry, no music theory) ---------- */
const BEAT_W = 40, STAFF_LEFT = 32, BARS_PER_ROW = 2, BEATS_PER_BAR = 4;
const HALF_GAP = 4, ROW_H = 110, STAFF_TOP0 = 50, NOTE_RX = 5, NOTE_RY = 4, STEM_LEN = 26;
const INK = "#201f1b", MUTED = "#6f665b";
const LETTER_ORD = {C:0,D:1,E:2,F:3,G:4,A:5,B:6};
// Degree-label row (task 4): fixed offset below staffTopY rather than
// relative to each note's own height, so labels stay in one tidy line
// regardless of pitch -- 62px clears the lowest note in the register band
// (MELODY_MIN_STEP, with its ledger line) by a comfortable margin.
const DEGREE_LABEL_Y = 62, DEGREE_LABEL_SIZE = 9.5, DEGREE_LABEL_SIZE_DENSE = 7.5, DEGREE_TENSION_COLOR = "#8a2d6b";
const BEAM_Y_PAD = 4; // extra stem length beyond STEM_LEN so beams clear noteheads of varying pitch

function yForStep(step, staffTopY){ return staffTopY + (8 - step) * HALF_GAP; }
function ledgerSteps(step){
  const out = [];
  if (step > 8) for (let s = 10; s <= step; s += 2) out.push(s);
  else if (step < 0) for (let s = -2; s >= step; s -= 2) out.push(s);
  return out;
}
function diatonicStep(letter, octave){
  const ord = octave * 7 + LETTER_ORD[letter];
  const ordE4 = 4 * 7 + LETTER_ORD['E'];
  return ord - ordE4;
}
function escapeXml(s){ return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

function renderScore(notes, chordPlan){
  const totalBars = chordPlan.totalBars;
  const rows = Math.ceil(totalBars / BARS_PER_ROW);
  const svgW = STAFF_LEFT + BARS_PER_ROW * BEATS_PER_BAR * BEAT_W + 16;
  const svgH = STAFF_TOP0 + Math.max(0, rows - 1) * ROW_H + 86;

  let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" width="100%" xmlns="http://www.w3.org/2000/svg">`;

  for (let row = 0; row < rows; row++){
    const staffTopY = STAFF_TOP0 + row * ROW_H;
    const barStart = row * BARS_PER_ROW;
    const barsInRow = Math.min(BARS_PER_ROW, totalBars - barStart);
    const rowBarEnd = barStart + barsInRow;
    const rowRight = STAFF_LEFT + barsInRow * BEATS_PER_BAR * BEAT_W;

    for (let li = 0; li < 5; li++){
      const y = staffTopY + li * HALF_GAP * 2;
      svg += `<line x1="${STAFF_LEFT - 6}" x2="${rowRight + 8}" y1="${y}" y2="${y}" stroke="${MUTED}" stroke-width="1"/>`;
    }
    svg += `<text x="${STAFF_LEFT - 26}" y="${staffTopY + 26}" font-size="28" fill="${INK}">\u{1D11E}</text>`;
    for (let bi = 0; bi <= barsInRow; bi++){
      const x = STAFF_LEFT + bi * BEATS_PER_BAR * BEAT_W;
      svg += `<line x1="${x}" x2="${x}" y1="${staffTopY}" y2="${staffTopY + 32}" stroke="${INK}" stroke-width="${bi === barsInRow ? 2 : 1}"/>`;
    }
    chordPlan.events.filter(e => e.barIndex >= barStart && e.barIndex < rowBarEnd).forEach(e => {
      const localBeat = (e.barIndex - barStart) * BEATS_PER_BAR + e.beatInBar;
      const x = STAFF_LEFT + localBeat * BEAT_W;
      const color = CHORD_COLORS[e.fn] || INK;
      svg += `<text x="${x}" y="${staffTopY - 10}" font-size="14" font-weight="700" fill="${color}">${escapeXml(e.label)}</text>`;
    });

    // Notehead / ledger / accidental / tie-sustain / degree-label pass, plus
    // per-note geometry cached for the beam pass below.
    const rowNotes = notes.filter(n => n.barIndex >= barStart && n.barIndex < rowBarEnd);
    const geo = new Map();
    rowNotes.forEach(n => {
      const localBeat = (n.barIndex - barStart) * BEATS_PER_BAR + n.beatInBar;
      const cx = STAFF_LEFT + localBeat * BEAT_W + (n.duration * BEAT_W) / 2;
      const step = diatonicStep(n.letter, n.octave);
      const y = yForStep(step, staffTopY);
      ledgerSteps(step).forEach(s => {
        const ly = yForStep(s, staffTopY);
        svg += `<line x1="${cx - 8}" x2="${cx + 8}" y1="${ly}" y2="${ly}" stroke="${INK}" stroke-width="1"/>`;
      });
      if (n.duration > 1 + 1e-6){
        const holdEndX = STAFF_LEFT + (localBeat + n.duration) * BEAT_W - 6;
        svg += `<line x1="${cx + 7}" x2="${holdEndX}" y1="${y}" y2="${y}" stroke="${INK}" stroke-width="2"/>`;
      }
      if (n.accidental){
        const glyph = n.accidental < 0 ? "♭" : "♯";
        svg += `<text x="${cx - 19}" y="${y + 7}" font-size="22" font-weight="700" fill="${INK}">${glyph}</text>`;
      }
      svg += `<ellipse cx="${cx}" cy="${y}" rx="${NOTE_RX}" ry="${NOTE_RY}" fill="${INK}"/>`;

      const chordEvent = activeChordForNote(n, chordPlan);
      if (chordEvent){
        const { name, isChordTone } = chordRelativeDegree(n, chordEvent);
        const color = isChordTone ? MUTED : DEGREE_TENSION_COLOR;
        const labelSize = n.duration < 0.6 ? DEGREE_LABEL_SIZE_DENSE : DEGREE_LABEL_SIZE;
        svg += `<text x="${cx}" y="${staffTopY + DEGREE_LABEL_Y}" font-size="${labelSize}" font-weight="700" fill="${color}" text-anchor="middle">${escapeXml(name)}</text>`;
      }

      geo.set(n, { cx, y, step });
    });

    // Stem pass: plain full-length stems for quarter notes (and longer held
    // notes) as before. Notes shorter than a beat (eighths/triplets) are
    // collected per beat below and beamed instead, so their stems are drawn
    // there -- skip them here.
    rowNotes.forEach(n => {
      if (n.duration < 1 - 1e-6) return;
      const { cx, y, step } = geo.get(n);
      const stemUp = step < 4;
      const stemX = stemUp ? cx + NOTE_RX - 1 : cx - NOTE_RX + 1;
      const stemY2 = stemUp ? y - STEM_LEN : y + STEM_LEN;
      svg += `<line x1="${stemX}" x2="${stemX}" y1="${y}" y2="${stemY2}" stroke="${INK}" stroke-width="1.4"/>`;
    });

    // Beam pass: group same-bar, same-beat notes shorter than 1 beat (eighth
    // pairs, triplet eighths) and connect their stems with one beam bar.
    // Triplet groups (3 notes) also get a small "3" over the beam. An
    // isolated short note (no group partner) falls back to a single flag --
    // not produced by any phrase in this app today, but kept so a future
    // mis-authored phrase degrades gracefully instead of drawing nothing.
    for (let bi = barStart; bi < rowBarEnd; bi++){
      for (let beatIdx = 0; beatIdx < BEATS_PER_BAR; beatIdx++){
        const group = rowNotes.filter(n => n.barIndex === bi && n.duration < 1 - 1e-6 &&
          n.beatInBar >= beatIdx - 1e-6 && n.beatInBar < beatIdx + 1 - 1e-6)
          .sort((a, b) => a.beatInBar - b.beatInBar);
        if (!group.length) continue;
        const avgStep = group.reduce((sum, n) => sum + geo.get(n).step, 0) / group.length;
        const stemUp = avgStep < 4;
        if (group.length === 1){
          const { cx, y } = geo.get(group[0]);
          const stemX = stemUp ? cx + NOTE_RX - 1 : cx - NOTE_RX + 1;
          const stemY2 = stemUp ? y - STEM_LEN : y + STEM_LEN;
          svg += `<line x1="${stemX}" x2="${stemX}" y1="${y}" y2="${stemY2}" stroke="${INK}" stroke-width="1.4"/>`;
          const flagY2 = stemUp ? stemY2 + 10 : stemY2 - 10;
          svg += `<path d="M${stemX} ${stemY2} Q${stemX + 8} ${(stemY2 + flagY2) / 2} ${stemX + 6} ${flagY2}" fill="none" stroke="${INK}" stroke-width="1.4"/>`;
          continue;
        }
        const beamY = stemUp
          ? Math.min(...group.map(n => geo.get(n).y)) - STEM_LEN - BEAM_Y_PAD
          : Math.max(...group.map(n => geo.get(n).y)) + STEM_LEN + BEAM_Y_PAD;
        group.forEach(n => {
          const { cx, y } = geo.get(n);
          const stemX = stemUp ? cx + NOTE_RX - 1 : cx - NOTE_RX + 1;
          svg += `<line x1="${stemX}" x2="${stemX}" y1="${y}" y2="${beamY}" stroke="${INK}" stroke-width="1.4"/>`;
        });
        const firstX = (stemUp ? geo.get(group[0]).cx + NOTE_RX - 1 : geo.get(group[0]).cx - NOTE_RX + 1);
        const lastX = (stemUp ? geo.get(group[group.length - 1]).cx + NOTE_RX - 1 : geo.get(group[group.length - 1]).cx - NOTE_RX + 1);
        svg += `<line x1="${firstX}" x2="${lastX}" y1="${beamY}" y2="${beamY}" stroke="${INK}" stroke-width="3"/>`;
        if (group.length === 3){
          const midX = (firstX + lastX) / 2;
          const numY = stemUp ? beamY - 6 : beamY + 12;
          svg += `<text x="${midX}" y="${numY}" font-size="12" font-style="italic" fill="${INK}" text-anchor="middle">3</text>`;
        }
      }
    }
  }
  svg += `</svg>`;
  document.getElementById("score").innerHTML = svg;
}

/* ---------- chord-plan builder (per category) ---------- */
function barsToPlan(bars, fns){
  return { events: bars.map((label, i) => ({ barIndex: i, beatInBar: 0, label, fn: fns[i] })), totalBars: bars.length };
}
function getChordPlan(category, variant, key){
  if (category === "diatonic"){
    const isMinor = variant === "minor";
    const chords = (isMinor ? MINOR_251 : MAJOR_251)[key];
    const bars = practiceBars(chords);
    const fns = isMinor ? ["dim","V","I","I"] : ["ii","V","I","I"];
    return barsToPlan(bars, fns);
  }
  if (category === "approach" || category === "bebop"){
    const bars = practiceBars(MAJOR_251[key]);
    return barsToPlan(bars, ["ii","V","I","I"]);
  }
  if (category === "turnaround"){
    const dict = TURNAROUND_DICTS[variant] || TURNAROUND_BASIC;
    const bars = dict[key];
    const fns = TURNAROUND_FUNCS[variant] || TURNAROUND_FUNCS.basic;
    return barsToPlan(bars, fns);
  }
  if (category === "coltrane"){
    const centers = COLTRANE_CENTERS[key];
    const events = [];
    centers.forEach((center, i) => {
      const [ii, V, I] = MAJOR_251[center];
      events.push({ barIndex: i * 2, beatInBar: 0, label: ii, fn: "ii" });
      events.push({ barIndex: i * 2, beatInBar: 2, label: V, fn: "V" });
      events.push({ barIndex: i * 2 + 1, beatInBar: 0, label: I, fn: "I" });
    });
    return { events, totalBars: centers.length * 2 };
  }
  return barsToPlan(practiceBars(MAJOR_251[key]), ["ii","V","I","I"]);
}
function getPhrasePool(category, variant){
  if (category === "diatonic") return variant === "minor" ? MINOR_PHRASES : MAJOR_PHRASES;
  if (category === "approach") return APPROACH_PHRASES;
  if (category === "bebop") return BEBOP_PHRASES;
  if (category === "turnaround") return TURNAROUND_PHRASES[variant] || TURNAROUND_PHRASES.basic;
  if (category === "coltrane") return COLTRANE_PHRASES;
  return MAJOR_PHRASES;
}

/* ---------- UI wiring ---------- */
const categorySelect = document.getElementById("category");
CATEGORIES.forEach(c => categorySelect.add(new Option(c.label, c.id)));
const modeSelect = document.getElementById("mode");
const keySelect = document.getElementById("key");
KEYS.forEach(k => keySelect.add(new Option(k, k)));
const modeField = document.getElementById("modeField");
const keyField = document.getElementById("keyField");

let currentIndex = 0;
let currentPractice = null;

function updateModeSelect(category){
  modeSelect.innerHTML = "";
  if (category === "diatonic"){
    modeSelect.add(new Option("Major 251","major"));
    modeSelect.add(new Option("Minor 251","minor"));
    modeField.style.display = "";
    keyField.classList.remove("full");
  } else if (category === "turnaround"){
    modeSelect.add(new Option("基本形","basic"));
    modeSelect.add(new Option("iii7代理","iiisub"));
    modeSelect.add(new Option("裏コード","tritone"));
    modeSelect.add(new Option("マイナー化","minorized"));
    modeField.style.display = "";
    keyField.classList.remove("full");
  } else {
    modeField.style.display = "none";
    keyField.classList.add("full");
  }
}
function seedIndex(category, variant, key){
  const pool = getPhrasePool(category, variant);
  const today = localYmd();
  return hashString(`${today}-${category}-${variant}-${key}`) % pool.length;
}
function render(){
  const category = categorySelect.value;
  const key = keySelect.value;
  const variant = modeSelect.value;
  const pool = getPhrasePool(category, variant);
  if (currentIndex >= pool.length) currentIndex = 0;
  const phrase = pool[currentIndex];
  const chordPlan = getChordPlan(category, variant, key);
  const beats = flattenPhrase(phrase, { key });
  renderScore(beats, chordPlan);

  const today = localYmd();
  const catLabel = CATEGORIES.find(c => c.id === category).label;
  document.getElementById("dateLine").textContent = `${today} / Key: ${key} / ${catLabel}`;
  document.getElementById("phraseName").textContent = phrase.name;
  document.getElementById("tip").textContent = phrase.tip;

  document.getElementById("prevBtn").disabled = pool.length <= 1;
  document.getElementById("nextBtn").disabled = pool.length <= 1;

  const irealSection = document.getElementById("irealSection");
  irealSection.style.display = "";
  const TURNAROUND_LABEL = { basic:"基本形", iiisub:"iii7代理", tritone:"裏コード", minorized:"マイナー化" };
  const titleByCategory = {
    diatonic: `Daily 251 ${variant === "minor" ? "Minor" : "Major"} ${key}`,
    approach: `Daily 251 Approach ${key}`,
    bebop: `Daily 251 Bebop ${key}`,
    turnaround: `Daily 251 Turnaround ${TURNAROUND_LABEL[variant] || "基本形"} ${key}`,
    coltrane: `Daily 251 Coltrane ${key}`
  };
  currentPractice = {
    title: titleByCategory[category] || `Daily 251 ${key}`,
    mode: (category === "diatonic" && variant === "minor") ? "Minor" : "Major",
    key, chordPlan
  };
  document.getElementById("irealStatus").textContent = "";
}

categorySelect.addEventListener("change", () => {
  updateModeSelect(categorySelect.value);
  currentIndex = seedIndex(categorySelect.value, modeSelect.value, keySelect.value);
  render();
});
modeSelect.addEventListener("change", () => {
  currentIndex = seedIndex(categorySelect.value, modeSelect.value, keySelect.value);
  render();
});
keySelect.addEventListener("change", () => render());
document.getElementById("todayBtn").addEventListener("click", () => { keySelect.value = todayKey(); render(); });
document.getElementById("prevBtn").addEventListener("click", () => {
  const pool = getPhrasePool(categorySelect.value, modeSelect.value);
  currentIndex = (currentIndex - 1 + pool.length) % pool.length;
  render();
});
document.getElementById("nextBtn").addEventListener("click", () => {
  const pool = getPhrasePool(categorySelect.value, modeSelect.value);
  currentIndex = (currentIndex + 1) % pool.length;
  render();
});
document.getElementById("irealBtn").addEventListener("click", () => {
  // Custom URL schemes must be navigated to synchronously inside the click
  // handler, or iOS Safari may drop the gesture and silently do nothing.
  document.getElementById("irealStatus").textContent = "iReal Proを起動しています…開かない場合は「iReal Pro用リンクをコピー」をお試しください。";
  window.location.href = irealUrl();
});
document.getElementById("copyBtn").addEventListener("click", async () => {
  const url = irealUrl();
  try {
    await navigator.clipboard.writeText(url);
    document.getElementById("irealStatus").textContent = "リンクをコピーしました。iReal Proを開き「＋」→「Clipboard」から新規曲として読み込んでください。";
  } catch {
    document.getElementById("irealStatus").textContent = url;
  }
});

updateModeSelect(categorySelect.value);
keySelect.value = todayKey();
currentIndex = seedIndex(categorySelect.value, modeSelect.value, keySelect.value);
render();
if ("serviceWorker" in navigator) navigator.serviceWorker.register("service-worker.js").catch(()=>{});
</script>
</body>
</html>
