    label { display:block; color:var(--muted); font-size:12px; margin:0 0 5px; }

    button.secondary { background:#fffdf8; color:var(--accent); }
    button:disabled { opacity:.4; }

    .name { font-size:22px; font-weight:800; margin:0 0 16px; color:var(--accent-2); }
    .section { color:var(--muted); font-size:13px; font-weight:700; margin:16px 0 7px; }
    .score { background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:10px 6px; overflow-x:auto; }
    .score svg { display:block; margin:0 auto; }
    .tip { font-size:17px; line-height:1.6; background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:14px; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
    .ireal-actions { display:grid; grid-template-columns:1fr; gap:8px; margin-top:12px; }
    .status { min-height:18px; color:var(--muted); font-size:13px; margin:8px 0 0; }

<body>

    <summary>練習メモ</summary>
    <div>
      1. まずテンポ ♩=60 で全部8分音符。<br>
      2. コードだけを先にアルペジオで確認。<br>
      3. キーを変えて12キー移調。<br>
      4. 最後の小節だけ自分で変奏。<br><br>
      数字はI chordから見た度数です。b9/#9/b13は主にV7で使うテンションです。
    </div>

/* ---------- misc helpers (dates / hashing / iReal export) ---------- */
function localYmd(date = new Date()){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}
function hashString(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function todayKey(){ const d = new Date(); const n = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate(); return KEYS[n % KEYS.length]; }
function irealChord(chord){
  return chord
    .replace("maj7", "^7")
    .replace("m7b5", "h7")
    .replace("m6", "-6")
    .replace("m7", "-7");
}
// Phrases are written as 4 bars (ii, V, I, I) so the tonic gets a full
// 2 bars to resolve into, but MAJOR_251/MINOR_251 only lists 3 chords.
// Hold the tonic for the 4th bar so displayed/exported measures line up
// 1:1 with the phrase's degree notation.
function practiceBars(chords){
  return [chords[0], chords[1], chords[2], chords[2]];
}
// iReal Pro only accepts minor key labels from a fixed set that uses
// sharps for these three (e.g. "Ab" major becomes "G#-" minor), not flats.
const IREAL_MINOR_KEY_LABEL = {Db:"C#-", Gb:"F#-", Ab:"G#-"};
function irealKeyLabel(mode, key){
  if (!mode.startsWith("Minor")) return key;
  return IREAL_MINOR_KEY_LABEL[key] || `${key}-`;
}
// Wrapping in repeat bars ({ }) both supplies the opening bar-line marker
// that every real iReal Pro chart starts with (without one, iReal Pro's
// own chord-tone display can fail to sync on measure 1) and lets iReal
// Pro repeat the 4-bar phrase itself, instead of writing it out twice.
function irealProgressionText(chords){
  const bars = practiceBars(chords).map(irealChord);
  return `T44{${bars.join(" |")} } Z`;
}
// Builds the custom irealbook:// URL documented at
// https://www.irealpro.com/ireal-pro-custom-chord-chart-protocol
function irealUrl(){
  if (!currentPractice) return "";
  const { title, mode, key, chords } = currentPractice;
  const composer = "App Daily251";
  const style = "Medium Swing";
  const keyLabel = irealKeyLabel(mode, key);
  const progression = irealProgressionText(chords);
  const raw = `${title}=${composer}=${style}=${keyLabel}=n=${progression}`;
  return `irealbook://${encodeURIComponent(raw)}`;
}

/* ---------- theory layer: scale-degree token -> letter/accidental/octave ---------- */
const LETTERS = ['C','D','E','F','G','A','B'];
const NATURAL_PC = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};
const MAJOR_STEP_SEMITONES = [0,2,4,5,7,9,11];
// Target register band for flattenPhrase's octave selection, expressed as
// diatonicStep (0 = E4, the bottom staff line). C4 (1 ledger line below the
// staff) up to B5 (1 ledger line above -- one step past A5, since every other
// letter gets two candidate octaves in this band [its octave-4 and octave-5
// spelling] but B's octave-5 spelling, B5, is step 11, one past a plain
// A5 ceiling; without it B is the only letter locked to a single octave,
// which forces large leaps whenever a nearby note approaches from above).
const MELODY_MIN_STEP = -2, MELODY_MAX_STEP = 11;

function parseKeySpelling(keyStr){
  return { letter: keyStr[0], acc: keyStr.length > 1 && keyStr[1] === 'b' ? -1 : 0 };
}
// Degree numbers (1-9, 13, optionally b/#-prefixed) are read as major-scale
// steps above the tonic, per this app's existing notation convention.
function degreeLetterAndPc(tonic, token){
  const m = /^([b#]?)([1-9]|13)$/.exec(token);
  const alter = m[1] === 'b' ? -1 : m[1] === '#' ? 1 : 0;
  const num = parseInt(m[2], 10);
  const baseNum = num > 7 ? num - 7 : num;                 // 9->2, 13->6
  const stepFromTonic = (baseNum - 1) + (num > 7 ? 7 : 0);  // diatonic steps above tonic

  const tonicLetterIdx = LETTERS.indexOf(tonic.letter);
  const absLetterIdx = tonicLetterIdx + stepFromTonic;
  const letter = LETTERS[((absLetterIdx % 7) + 7) % 7];
  const letterOctaveOffset = Math.floor(absLetterIdx / 7);

  const tonicPc = ((NATURAL_PC[tonic.letter] + tonic.acc) % 12 + 12) % 12;
  const targetPc = ((tonicPc + MAJOR_STEP_SEMITONES[baseNum - 1] + alter) % 12 + 12) % 12;
  let accidental = targetPc - NATURAL_PC[letter];
  if (accidental > 6) accidental -= 12;
  if (accidental < -6) accidental += 12;
  return { letter, accidental, targetPc };
}
function resolveTonicForSegment(seg, ctx){
  if (seg.tonicRef && seg.tonicRef.centerIndex !== undefined){
    return parseKeySpelling(COLTRANE_CENTERS[ctx.key][seg.tonicRef.centerIndex]);
  }
  return parseKeySpelling(ctx.key);
}
// Picks the octave for one note. Only octaves that keep the note inside the
// [MELODY_MIN_STEP, MELODY_MAX_STEP] register band are considered, so the
// letter name/accidental (and therefore its harmonic meaning, e.g. "b5 of
// Bbm7b5") never changes -- only which octave it's placed in. Among the
// in-band candidates, picks whichever is closest to the previous note
// (prevAbs === null for the first note of a phrase, where it instead picks
// the candidate closest to the middle of the staff, B4).
function pickOctaveInBand(letter, targetPc, prevAbs){
  const guess = prevAbs === null ? 4 : Math.round((prevAbs - targetPc) / 12);
  let candidates = [];
  for (let o = guess - 2; o <= guess + 2; o++){
    const step = diatonicStep(letter, o);
    if (step >= MELODY_MIN_STEP && step <= MELODY_MAX_STEP) candidates.push(o);
  }
  if (!candidates.length){
    for (let o = guess - 6; o <= guess + 6; o++){
      const step = diatonicStep(letter, o);
      if (step >= MELODY_MIN_STEP && step <= MELODY_MAX_STEP) candidates.push(o);
    }
  }
  if (prevAbs === null){
    return candidates.reduce((best, o) =>
      Math.abs(diatonicStep(letter, o) - 4) < Math.abs(diatonicStep(letter, best) - 4) ? o : best);
  }
  return candidates.reduce((best, o) =>
    Math.abs(o * 12 + targetPc - prevAbs) < Math.abs(best * 12 + targetPc - prevAbs) ? o : best);
}
// Expands a phrase's degree text into a flat beat sequence. Each new (non-hold)
// note picks whichever in-band octave lands closest to the previous note's
// pitch, so e.g. "1 6 4 2" actually descends instead of always resolving
// upward, while staying inside the readable register band.
function flattenPhrase(phrase, ctx){
  const segments = phrase.segments || [{ tonicRef: "self", degrees: phrase.degrees }];
  const pairs = [];
  segments.forEach(seg => {
    const tonic = resolveTonicForSegment(seg, ctx);
    seg.degrees.split("|").forEach(barStr => {
      barStr.trim().split(/\s+/).forEach(tok => pairs.push({ tonic, tok }));
    });
  });
  let prevAbs = null;
  const beats = [];
  pairs.forEach(({ tonic, tok }) => {
    if (tok === "-") { beats.push({ hold: true }); return; }
    const d = degreeLetterAndPc(tonic, tok);
    const octave = pickOctaveInBand(d.letter, d.targetPc, prevAbs);
    prevAbs = octave * 12 + d.targetPc;
    beats.push({ hold: false, letter: d.letter, accidental: d.accidental, octave });
  });
  return beats;
}

/* ---------- SVG score rendering (pure geometry, no music theory) ---------- */
const BEAT_W = 40, STAFF_LEFT = 32, BARS_PER_ROW = 2, BEATS_PER_BAR = 4;
const HALF_GAP = 4, ROW_H = 110, STAFF_TOP0 = 50, NOTE_RX = 5, NOTE_RY = 4, STEM_LEN = 26;
const INK = "#201f1b", MUTED = "#6f665b";
const LETTER_ORD = {C:0,D:1,E:2,F:3,G:4,A:5,B:6};

function yForStep(step, staffTopY){ return staffTopY + (8 - step) * HALF_GAP; }
function ledgerSteps(step){
  const out = [];
  if (step > 8) for (let s = 10; s <= step; s += 2) out.push(s);
  else if (step < 0) for (let s = -2; s >= step; s -= 2) out.push(s);
  return out;
}
function diatonicStep(letter, octave){
  const ord = octave * 7 + LETTER_ORD[letter];
  const ordE4 = 4 * 7 + LETTER_ORD['E'];
  return ord - ordE4;
}
function escapeXml(s){ return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

function renderScore(beats, chordPlan){
  const totalBars = chordPlan.totalBars;
  const rows = Math.ceil(totalBars / BARS_PER_ROW);
  const svgW = STAFF_LEFT + BARS_PER_ROW * BEATS_PER_BAR * BEAT_W + 16;
  const svgH = STAFF_TOP0 + Math.max(0, rows - 1) * ROW_H + 70;

  const notes = [];
  beats.forEach((b, i) => {
    if (b.hold) { if (notes.length) notes[notes.length - 1].endBeat = i; }
    else notes.push({ startBeat: i, endBeat: i, letter: b.letter, accidental: b.accidental, octave: b.octave });
  });

  let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" width="100%" xmlns="http://www.w3.org/2000/svg">`;

  for (let row = 0; row < rows; row++){
    const staffTopY = STAFF_TOP0 + row * ROW_H;
    const barStart = row * BARS_PER_ROW;
    const barsInRow = Math.min(BARS_PER_ROW, totalBars - barStart);
    const rowBeatStart = barStart * BEATS_PER_BAR;
    const rowBeatEnd = rowBeatStart + barsInRow * BEATS_PER_BAR;
    const rowRight = STAFF_LEFT + barsInRow * BEATS_PER_BAR * BEAT_W;

    for (let li = 0; li < 5; li++){
      const y = staffTopY + li * HALF_GAP * 2;
      svg += `<line x1="${STAFF_LEFT - 6}" x2="${rowRight + 8}" y1="${y}" y2="${y}" stroke="${MUTED}" stroke-width="1"/>`;
    }
    svg += `<text x="${STAFF_LEFT - 26}" y="${staffTopY + 26}" font-size="28" fill="${INK}">\u{1D11E}</text>`;
    for (let bi = 0; bi <= barsInRow; bi++){
      const x = STAFF_LEFT + bi * BEATS_PER_BAR * BEAT_W;
      svg += `<line x1="${x}" x2="${x}" y1="${staffTopY}" y2="${staffTopY + 32}" stroke="${INK}" stroke-width="${bi === barsInRow ? 2 : 1}"/>`;
    }
    chordPlan.events.filter(e => e.barIndex >= barStart && e.barIndex < barStart + barsInRow).forEach(e => {
      const localBeat = (e.barIndex - barStart) * BEATS_PER_BAR + e.beatInBar;
      const x = STAFF_LEFT + localBeat * BEAT_W;
      const color = CHORD_COLORS[e.fn] || INK;
      svg += `<text x="${x}" y="${staffTopY - 10}" font-size="14" font-weight="700" fill="${color}">${escapeXml(e.label)}</text>`;
    });
    notes.forEach(n => {
      if (n.startBeat < rowBeatStart || n.startBeat >= rowBeatEnd) return;
      const localStart = n.startBeat - rowBeatStart;
      const localEnd = Math.min(n.endBeat - rowBeatStart, barsInRow * BEATS_PER_BAR - 1);
      const cx = STAFF_LEFT + localStart * BEAT_W + BEAT_W / 2;
      const step = diatonicStep(n.letter, n.octave);
      const y = yForStep(step, staffTopY);
      ledgerSteps(step).forEach(s => {
        const ly = yForStep(s, staffTopY);
        svg += `<line x1="${cx - 8}" x2="${cx + 8}" y1="${ly}" y2="${ly}" stroke="${INK}" stroke-width="1"/>`;
      });
      if (localEnd > localStart){
        const holdEndX = STAFF_LEFT + (localEnd + 1) * BEAT_W - 6;
        svg += `<line x1="${cx + 7}" x2="${holdEndX}" y1="${y}" y2="${y}" stroke="${INK}" stroke-width="2"/>`;
      }
      if (n.accidental){
        const glyph = n.accidental < 0 ? "♭" : "♯";
        svg += `<text x="${cx - 15}" y="${y + 4}" font-size="12" fill="${INK}">${glyph}</text>`;
      }
      svg += `<ellipse cx="${cx}" cy="${y}" rx="${NOTE_RX}" ry="${NOTE_RY}" fill="${INK}"/>`;
      const stemUp = step < 4;
      const stemX = stemUp ? cx + NOTE_RX - 1 : cx - NOTE_RX + 1;
      const stemY2 = stemUp ? y - STEM_LEN : y + STEM_LEN;
      svg += `<line x1="${stemX}" x2="${stemX}" y1="${y}" y2="${stemY2}" stroke="${INK}" stroke-width="1.4"/>`;
    });
  }
  svg += `</svg>`;
  document.getElementById("score").innerHTML = svg;
}

/* ---------- chord-plan builder (per category) ---------- */
function barsToPlan(bars, fns){
  return { events: bars.map((label, i) => ({ barIndex: i, beatInBar: 0, label, fn: fns[i] })), totalBars: bars.length };
}
function getChordPlan(category, variant, key){
  if (category === "diatonic"){
    const isMinor = variant === "minor";
    const chords = (isMinor ? MINOR_251 : MAJOR_251)[key];
    const bars = practiceBars(chords);
    const fns = isMinor ? ["dim","V","I","I"] : ["ii","V","I","I"];
    return barsToPlan(bars, fns);
  }
  if (category === "approach" || category === "bebop"){
    const bars = practiceBars(MAJOR_251[key]);
    return barsToPlan(bars, ["ii","V","I","I"]);
  }
  if (category === "turnaround"){
    const dict = TURNAROUND_DICTS[variant] || TURNAROUND_BASIC;
    const bars = dict[key];
    const fns = TURNAROUND_FUNCS[variant] || TURNAROUND_FUNCS.basic;
    return barsToPlan(bars, fns);
  }
  if (category === "coltrane"){
    const centers = COLTRANE_CENTERS[key];
    const events = [];
    centers.forEach((center, i) => {
      const [ii, V, I] = MAJOR_251[center];
      events.push({ barIndex: i * 2, beatInBar: 0, label: ii, fn: "ii" });
      events.push({ barIndex: i * 2, beatInBar: 2, label: V, fn: "V" });
      events.push({ barIndex: i * 2 + 1, beatInBar: 0, label: I, fn: "I" });
    });
    return { events, totalBars: centers.length * 2 };
  }
  return barsToPlan(practiceBars(MAJOR_251[key]), ["ii","V","I","I"]);
}
function getPhrasePool(category, variant){
  if (category === "diatonic") return variant === "minor" ? MINOR_PHRASES : MAJOR_PHRASES;
  if (category === "approach") return APPROACH_PHRASES;
  if (category === "bebop") return BEBOP_PHRASES;
  if (category === "turnaround") return TURNAROUND_PHRASES[variant] || TURNAROUND_PHRASES.basic;
  if (category === "coltrane") return COLTRANE_PHRASES;
  return MAJOR_PHRASES;
}

/* ---------- UI wiring ---------- */
const categorySelect = document.getElementById("category");
CATEGORIES.forEach(c => categorySelect.add(new Option(c.label, c.id)));
const modeSelect = document.getElementById("mode");
const keySelect = document.getElementById("key");
KEYS.forEach(k => keySelect.add(new Option(k, k)));
const modeField = document.getElementById("modeField");
const keyField = document.getElementById("keyField");

let currentIndex = 0;
let currentPractice = null;

function updateModeSelect(category){
  modeSelect.innerHTML = "";
  if (category === "diatonic"){
    modeSelect.add(new Option("Major 251","major"));
    modeSelect.add(new Option("Minor 251","minor"));
    modeField.style.display = "";
    keyField.classList.remove("full");
  } else if (category === "turnaround"){
    modeSelect.add(new Option("基本形","basic"));
    modeSelect.add(new Option("iii7代理","iiisub"));
    modeSelect.add(new Option("裏コード","tritone"));
    modeSelect.add(new Option("マイナー化","minorized"));
    modeField.style.display = "";
    keyField.classList.remove("full");
  } else {
    modeField.style.display = "none";
    keyField.classList.add("full");
  }
}
function seedIndex(category, variant, key){
  const pool = getPhrasePool(category, variant);
  const today = localYmd();
  return hashString(`${today}-${category}-${variant}-${key}`) % pool.length;
}
function render(){
  const category = categorySelect.value;
  const key = keySelect.value;
  const variant = modeSelect.value;
  const pool = getPhrasePool(category, variant);
  if (currentIndex >= pool.length) currentIndex = 0;
  const phrase = pool[currentIndex];
  const chordPlan = getChordPlan(category, variant, key);
  const beats = flattenPhrase(phrase, { key });
  renderScore(beats, chordPlan);

  const today = localYmd();
  const catLabel = CATEGORIES.find(c => c.id === category).label;
  document.getElementById("dateLine").textContent = `${today} / Key: ${key} / ${catLabel}`;
  document.getElementById("phraseName").textContent = phrase.name;
  document.getElementById("tip").textContent = phrase.tip;

  document.getElementById("prevBtn").disabled = pool.length <= 1;
  document.getElementById("nextBtn").disabled = pool.length <= 1;

  const irealSection = document.getElementById("irealSection");
  if (category === "diatonic"){
    irealSection.style.display = "";
    const isMinor = variant === "minor";
    const chords = (isMinor ? MINOR_251 : MAJOR_251)[key];
    currentPractice = {
      title: `Daily 251 ${isMinor ? "Minor" : "Major"} ${key}`,
      mode: isMinor ? "Minor" : "Major",
      key, chords
    };
    document.getElementById("irealStatus").textContent = "";
  } else {
    irealSection.style.display = "none";
    currentPractice = null;
  }
}

categorySelect.addEventListener("change", () => {
  updateModeSelect(categorySelect.value);
  currentIndex = seedIndex(categorySelect.value, modeSelect.value, keySelect.value);
  render();
});
modeSelect.addEventListener("change", () => {
  currentIndex = seedIndex(categorySelect.value, modeSelect.value, keySelect.value);
  render();
});
keySelect.addEventListener("change", () => render());
document.getElementById("todayBtn").addEventListener("click", () => { keySelect.value = todayKey(); render(); });
document.getElementById("prevBtn").addEventListener("click", () => {
  const pool = getPhrasePool(categorySelect.value, modeSelect.value);
  currentIndex = (currentIndex - 1 + pool.length) % pool.length;
  render();
});
document.getElementById("nextBtn").addEventListener("click", () => {
  const pool = getPhrasePool(categorySelect.value, modeSelect.value);
  currentIndex = (currentIndex + 1) % pool.length;
  render();
});
document.getElementById("irealBtn").addEventListener("click", () => {
  // Custom URL schemes must be navigated to synchronously inside the click
  // handler, or iOS Safari may drop the gesture and silently do nothing.
  document.getElementById("irealStatus").textContent = "iReal Proを起動しています…開かない場合は「iReal Pro用リンクをコピー」をお試しください。";
  window.location.href = irealUrl();
});
document.getElementById("copyBtn").addEventListener("click", async () => {
  const url = irealUrl();
  try {
    await navigator.clipboard.writeText(url);
    document.getElementById("irealStatus").textContent = "リンクをコピーしました。iReal Proを開き「＋」→「Clipboard」から新規曲として読み込んでください。";
  } catch {
    document.getElementById("irealStatus").textContent = url;
  }
});

updateModeSelect(categorySelect.value);
keySelect.value = todayKey();
currentIndex = seedIndex(categorySelect.value, modeSelect.value, keySelect.value);
render();
if ("serviceWorker" in navigator) navigator.serviceWorker.register("service-worker.js").catch(()=>{});
</script>
